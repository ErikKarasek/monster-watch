<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlídač Monster Energy - 3D LIVE HUD</title>
    <!-- PWA & MOBILE OPTIMIZATION -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MonsterWatch">
    <link rel="apple-touch-icon" href="/assets/Monster_Energy_500ml_5060166692599__1__copy-removebg-preview.png">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/assets/Monster_Energy_500ml_5060166692599__1__copy-removebg-preview.png">
    <!-- Three.js + GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- GSAP pro animace -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700;900&display=swap');
        :root { --neon: #39FF14; --purple: #BD00FF; --cyber-bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .iphone { width: 393px; height: 852px; background: #000; border-radius: 60px; border: 4px solid #1a1a1a; position: relative; padding: 10px; box-shadow: 0 0 100px rgba(57, 255, 20, 0.15); }
        @media (max-width: 500px) { .iphone { width: 100vw; height: 100vh; border-radius: 0; border: none; padding: 0; } }
        .screen { width: 100%; height: 100%; background: var(--cyber-bg); border-radius: 48px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        @media (max-width: 500px) { .screen { border-radius: 0; } }
        #splash { position: absolute; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        #three-canvas { width: 100%; height: 75%; }
        .splash-ui { text-align: center; margin-top: -30px; z-index: 5001; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        header { padding: 60px 0 20px; border-bottom: 1px solid #111; text-align: center; background: #000; width: 100%; }
        .feed { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; padding-bottom: 100px; }
        .card { background: rgba(255,255,255,0.02); border-radius: 24px; border: 1px solid #151515; padding: 15px; position: relative; cursor: pointer; transition: 0.3s; text-align: center; animation: cardEntry 0.5s ease-out both; }
        @keyframes cardEntry { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .img-box { height: 130px; width: 100%; margin-bottom: 12px; border-radius: 15px; background: radial-gradient(circle, #111 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .img-box img { height: 100%; object-fit: contain; }
        .flv { font-size: 10px; font-weight: 900; color: #fff; margin-bottom: 2px; text-transform: uppercase; }
        .price-val { color: var(--neon); font-size: 18px; font-weight: 900; }
        .shop-badge { font-size: 6px; color: #888; background: #111; padding: 2px 5px; border-radius: 4px; border: 1px solid #222; margin-top: 5px; }
        .letak-tag { position: absolute; top: 10px; right: 10px; background: var(--purple); color: #fff; font-size: 6px; font-weight: 900; padding: 3px 6px; border-radius: 5px; box-shadow: 0 0 100px var(--purple); }
        #modal { position: absolute; inset: 0; background: rgba(0,0,0,0.97); z-index: 6000; display: none; padding: 25px; flex-direction: column; justify-content: center; }
        .m-box { background: #050505; border-radius: 40px; border: 1px solid #222; padding: 30px; position: relative; width: 100%; }
        .m-close { position: absolute; top: 25px; right: 25px; color: #444; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="iphone">
        <div class="screen">
            <div id="splash">
                <canvas id="three-canvas"></canvas>
                <div class="splash-ui">
                    <div class="logo">MONSTER<span>WATCH</span></div>
                    <div style="color:var(--neon); font-size:8px; letter-spacing:4px; margin-top:10px; font-weight:900" id="load-status">NEON PROTOCOL v8.0</div>
                </div>
            </div>
            <header><div class="logo">MONSTER<span>WATCH</span></div></header>
            <div class="feed" id="feed"></div>
            <div id="modal">
                <div class="m-box">
                    <div class="m-close" onclick="hideM()">✕</div>
                    <div id="m-content"></div>
                    <button style="width:100%; background:var(--neon); color:#000; padding:18px; border-radius:18px; font-weight:900; border:none; margin-top:20px; letter-spacing:1px;" onclick="hideM()">ZPĚT NA FEED</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let scene, camera, renderer, canModel;
        function init3D() {
            const canvas = document.getElementById('three-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const p1 = new THREE.PointLight(0x39FF14, 5, 20); p1.position.set(5, 5, 5); scene.add(p1);
            const p2 = new THREE.PointLight(0xBD00FF, 3, 20); p2.position.set(-5, -5, 5); scene.add(p2);
            camera.position.z = 5;
            const loader = new THREE.GLTFLoader();
            loader.load('assets/monster_3d.glb', (gltf) => {
                canModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(canModel);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                canModel.position.sub(center);
                const scale = 3.5 / size;
                canModel.scale.set(scale, scale, scale);
                scene.add(canModel);
                gsap.from(canModel.position, { y: 10, duration: 2.5, ease: "bounce.out" });
                gsap.from(canModel.rotation, { x: 5, z: 2, duration: 3 });
                gsap.to(canModel.rotation, { y: Math.PI * 2, duration: 12, repeat: -1, ease: "none" });
                setTimeout(() => {
                    gsap.to("#splash", { opacity: 0, duration: 1.2, onComplete: () => { document.getElementById('splash').style.display = 'none'; }});
                }, 5000);
            });
        }
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        
        const CURRENT_DEALS = [
            { store: 'Kaufland', price: 26.90, isFlyer: true },
            { store: 'Ratio', price: 26.90, isFlyer: true },
            { store: 'JIP', price: 27.90, isFlyer: true },
            { store: 'Lidl', price: 27.90, isFlyer: false },
            { store: 'Penny', price: 29.90, isFlyer: true },
            { store: 'Albert', price: 32.90, isFlyer: true },
            { store: 'BILLA', price: 32.90, isFlyer: true },
            { store: 'Globus', price: 32.90, isFlyer: true },
            { store: 'Hruška', price: 44.90, isFlyer: true }
        ];

        const MOCK_PRODUCTS = [
            { id: 1, flavor: 'Original', imageUrl: 'assets/Monster_Energy_500ml_5060166692599__1__copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 2, flavor: 'Ultra White', imageUrl: 'assets/Monster_Energy_Ultra_Zero_500ml_5060896626406_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Ratio', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 3, flavor: 'Mango Loco', imageUrl: 'assets/Monster_Mango_Loco_500ml_5060896626390-1_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Ratio', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 4, flavor: 'Pipeline Punch', imageUrl: 'assets/Monster_Pipeline_Punch_500ml_5060896626383_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 5, flavor: 'Nitro Super Dry', imageUrl: 'assets/Monster_Nitro_500ml_5060896625317_copy-removebg-preview.png', mainPrice: 27.90, mainStore: 'JIP', hasFlyer: true, actionDeals: CURRENT_DEALS.filter(d => d.store === 'JIP' || d.store === 'Ratio') },
            { id: 6, flavor: 'Monarch', imageUrl: 'assets/Monster_Juice_Monarch_500ml_5060896621234_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 7, flavor: 'Lando Norris', imageUrl: 'assets/Monster_Lando_Norris.png', mainPrice: 27.90, mainStore: 'JIP', hasFlyer: true, actionDeals: CURRENT_DEALS.filter(d => d.store === 'JIP' || d.store === 'Ratio' || d.store === 'Globus') },
            { id: 8, flavor: 'Aussie Lemonade', imageUrl: 'assets/Monster_Aussie_Lemonade_500ml_CZSK_5061013943949_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 9, flavor: 'Lewis Hamilton', imageUrl: 'assets/Monster_Lewis_Hamilton_500ml_5060896625720_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Ratio', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 10, flavor: 'Rio Punch', imageUrl: 'assets/Monster_Rio_Punch_500ml_CZSK_5056784902790_copy-removebg-preview.png', mainPrice: 27.90, mainStore: 'JIP', hasFlyer: true, actionDeals: CURRENT_DEALS.filter(d => d.store === 'JIP' || d.store === 'Ratio') },
            { id: 11, flavor: 'Green Zero', imageUrl: 'assets/Monster_Energy_Green_Zero_500ml_5060947549852_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 12, flavor: 'Khaotic', imageUrl: 'assets/Monster_Khaotic_500ml_5060947542716_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Ratio', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 13, flavor: 'Rossi Zero', imageUrl: 'assets/Monster_Rossi_Zero_500ml_CZSK_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Ratio', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 14, flavor: 'The Doctor', imageUrl: 'assets/Monster_The_Doctor_500ml_5060896626321-1_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 15, flavor: 'Ultra Fiesta', imageUrl: 'assets/Monster_Ultra_Fiesta_500_ml_5060896626437_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 16, flavor: 'Ultra Paradise', imageUrl: 'assets/Monster_Ultra_Paradise_500ml_5060896626420_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 17, flavor: 'Peachy Keen', imageUrl: 'assets/Monster_Ultra_Peachy_Keen_500ml_CZSK_5056784900796_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 18, flavor: 'Ultra Rosa', imageUrl: 'assets/Monster_Ultra_Rosa_500ml_CZSK_5061013941846_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 19, flavor: 'Strawberry Dreams', imageUrl: 'assets/Monster_Ultra_Strawberry_500ml_CZSK_copy-removebg-preview.png', mainPrice: 26.90, mainStore: 'Kaufland', hasFlyer: true, actionDeals: CURRENT_DEALS },
            { id: 20, flavor: 'Viking Berry', imageUrl: 'assets/Monster_Viking_Berry_500ml_CZSK_copy-removebg-preview.png', mainPrice: 27.90, mainStore: 'JIP', hasFlyer: true, actionDeals: CURRENT_DEALS.filter(d => d.store === 'JIP' || d.store === 'Ratio') }
        ];

        function fetchLiveDeals() {
            render(MOCK_PRODUCTS);
        }
        function render(products) {
            const f = document.getElementById('feed');
            f.innerHTML = '';
            products.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.style.animationDelay = `${idx * 0.05}s`;
                div.onclick = () => showM(p);
                div.innerHTML = `
                    ${p.hasFlyer ? '<div class="letak-tag">LETÁK</div>' : ''}
                    <div class="img-box"><img src="${p.imageUrl}" onerror="this.src='assets/icon.png'"></div>
                    <div class="flv">${p.flavor}</div>
                    <div class="price-val">${p.mainPrice ? p.mainPrice.toFixed(2) : '---'} Kč</div>
                    <div class="shop-badge">${p.mainStore || 'Aktivní'}</div>
                `;
                f.appendChild(div);
            });
        }
        function showM(p) {
            const m = document.getElementById('modal');
            document.getElementById('m-content').innerHTML = `
                <img src="${p.imageUrl}" style="height:180px; display:block; margin:0 auto 15px">
                <h2 style="text-align:center; font-size:28px; font-weight:900; text-transform:uppercase">${p.flavor}</h2>
                <div style="margin-top:20px">
                    <p style="font-size:10px; color:#444; margin-bottom:10px">REÁLNÉ AKCE (DUBEN 2026):</p>
                    <div style="max-height: 200px; overflow-y: auto;">
                        ${p.actionDeals.sort((a,b) => a.price - b.price).map(d => `
                            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #111">
                                <span style="font-weight:bold">${d.store} ${d.isFlyer ? '<span style="color:var(--purple); font-size:8px;">[LETÁK]</span>' : ''}</span>
                                <span style="color:var(--neon); font-weight:900">${d.price.toFixed(2)} Kč</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            m.style.display = 'flex';
        }
        function hideM() { document.getElementById('modal').style.display = 'none'; }
        window.onload = () => { init3D(); animate(); fetchLiveDeals(); };
    </script>
</body>
</html>
